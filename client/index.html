<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wizard Arena | local LAN 2-Player Combat</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
</head>

<body>
    <canvas id="gpu-bg"></canvas>
    <div id="game-container"></div>

    <!--
        Load order — each file depends only on what's above it:

        1.  config.js       — API keys (must be first)
        2.  spell-config.js — Global spell constants & volumeToScale()
        3.  audio.js        — Mic capture + Gemini; state machine events
        4.  arena.js        — window.ARENAS definitions
        5.  utils.js        — createCircleTexture, createSoulsButton
        6.  hud.js          — CastingHUD class (casting state indicators)
        7.  spells.js       — SpellCaster class; registers window.spellCaster
        8.  socket.js       — socket, myPlayerId, gameSceneRef + event wiring
        9.  scenes/         — Phaser Scene classes
        10. game.js         — Phaser.Game instantiation
        11. spell-fx.js     — WebGPU spell sprite generation (async, ES module)
        12. bg-shader.js    — WebGPU background (async, independent)
    -->
    <script src="config.js"></script>
    <script src="spell-config.js"></script>
    <script src="audio.js"></script>
    <script src="arena.js"></script>
    <script src="utils.js"></script>
    <script src="hud.js"></script>
    <script src="spells.js"></script>
    <script src="socket.js"></script>
    <script src="scenes/MenuScene.js"></script>
    <script src="scenes/EndScene.js"></script>
    <script src="scenes/GameScene.js"></script>
    <script type="module" src="spell-fx.js"></script>
    <script type="module" src="game.js"></script>
    <script type="module" src="bg-shader.js"></script>
</body>

</html>
